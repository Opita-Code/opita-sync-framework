name: Bug report
description: Reportar un problema concreto del framework
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Usá este template para bugs reproducibles del framework o del workflow del repo.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: Busqué issues existentes y no encontré un duplicado claro
          required: true
        - label: Incluí pasos concretos para reproducir el problema
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Descripción del bug
      placeholder: Al correr go test ./... ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a...
        2. Ejecutar...
        3. Ver...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Logs, entorno o screenshots si suman
    validations:
      required: false
